<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="calculator-box">
        <h2 id="display">0</h2>
        <div id="button-box">
            <div id="digit-buttons">
                <button class="digit-button" id="1">1</button>
                <button class="digit-button" id="2">2</button>
                <button class="digit-button" id="3">3</button>
                <button class="digit-button" id="4">4</button>
                <button class="digit-button" id="5">5</button>
                <button class="digit-button" id="6">6</button>
                <button class="digit-button" id="7">7</button>
                <button class="digit-button" id="8">8</button>
                <button class="digit-button" id="9">9</button>
                <button class="digit-button" id="0">0</button>
                <button class="digit-button" id=".">.</button>
                <button class="digit-button" id="Backspace">B</button>
            </div>
            <div id="operator-buttons">
                <button class="operator-button" id="+">+</button>
                <button class="operator-button" id="-">-</button>
                <button class="operator-button" id="*">*</button>
                <button class="operator-button" id="/">/</button>
                <button id="clear-button">C</button>
                <button class="operator-button three-tall-button" class="three-tall-button" id="=">=</button>
            </div>
        </div>
    </div>
</body>
</html>
