<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <h2 id="display">00000000</h2>
    <div id="button-box">
        <div id="digit-buttons">
            <button class="digit-button" id="1-button">1</button>
            <button class="digit-button" id="2-button">2</button>
            <button class="digit-button" id="3-button">3</button>
            <button class="digit-button" id="4-button">4</button>
            <button class="digit-button" id="5-button">5</button>
            <button class="digit-button" id="6-button">6</button>
            <button class="digit-button" id="7-button">7</button>
            <button class="digit-button" id="8-button">8</button>
            <button class="digit-button" id="9-button">9</button>
        </div>
        <div id="operator-buttons">
            <button class="operator-button" id="addition-button">+</button>
            <button class="operator-button" id="subtraction-button">-</button>
            <button class="operator-button" id="multiplication-button">*</button>
            <button class="operator-button" id="division-button">/</button>
            <button class="operator-button" id="equals-button">=</button>
        </div>
        <button id="clear-button">Clear</button>
    </div>
</body>
</html>
